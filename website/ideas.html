<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>오늘의 아이디어 리포트 — LUA BIM LABS</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Serif+KR:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<style>
:root {
  --bg:#14161a; --bg-2:#1e2024; --ink:#f0ebe1;
  --ink-soft:rgba(240,235,225,.7); --ink-mute:rgba(240,235,225,.45);
  --rule:rgba(240,235,225,.14);
  --green:oklch(0.68 0.15 145); --amber:oklch(0.78 0.16 80); --red:oklch(0.65 0.18 25);
  --f-en:"Instrument Serif",serif; --f-kr:"Noto Serif KR",serif;
  --f-body:"Pretendard",ui-sans-serif,system-ui,sans-serif;
  --f-mono:"JetBrains Mono",ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--f-body);-webkit-font-smoothing:antialiased;}
nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:rgba(20,22,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--rule);}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:var(--f-mono);font-size:14px;letter-spacing:.1em;color:var(--ink);text-decoration:none;}
.nav-logo svg{width:24px;height:24px;}
.nav-back{font-family:var(--f-mono);font-size:12px;letter-spacing:.08em;color:var(--ink-mute);text-decoration:none;text-transform:uppercase;}
.nav-back:hover{color:var(--ink);}
main{padding:80px 60px;max-width:1200px;margin:0 auto;}
.page-header{border-bottom:1px solid var(--rule);padding-bottom:40px;margin-bottom:56px;}
.label{font-family:var(--f-mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:16px;}
h1{font-family:var(--f-kr);font-weight:500;font-size:clamp(40px,6vw,72px);line-height:1.05;letter-spacing:-.025em;}
h1 em{font-family:var(--f-en);font-style:italic;font-weight:400;}
.subtitle{font-size:17px;line-height:1.7;color:var(--ink-soft);max-width:56ch;margin-top:14px;word-break:keep-all;}
.date-badge{display:inline-flex;align-items:center;gap:8px;margin-top:20px;font-family:var(--f-mono);font-size:12px;letter-spacing:.08em;padding:8px 16px;border:1px solid var(--rule);border-radius:999px;color:var(--ink-mute);}
.date-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
#loading{text-align:center;padding:80px 0;font-family:var(--f-mono);font-size:14px;color:var(--ink-mute);letter-spacing:.08em;}
/* idea cards */
.ideas-list{display:flex;flex-direction:column;gap:2px;}
.idea-card{border:1px solid var(--rule);border-radius:8px;background:var(--bg-2);overflow:hidden;transition:border-color .2s;}
.idea-card:hover{border-color:rgba(240,235,225,.28);}
.idea-header{display:grid;grid-template-columns:48px 1fr auto;gap:24px;align-items:center;padding:28px 32px;cursor:pointer;}
.idea-num{font-family:var(--f-en);font-size:48px;line-height:1;color:var(--ink-mute);}
.idea-title-block{}
.idea-label{font-family:var(--f-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:6px;}
.idea-title{font-family:var(--f-kr);font-weight:500;font-size:clamp(22px,3vw,32px);letter-spacing:-.02em;line-height:1.15;word-break:keep-all;}
.score-badge{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.score-ring{width:64px;height:64px;border-radius:50%;border:2px solid var(--rule);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-ring .v{font-family:var(--f-en);font-size:22px;line-height:1;}
.score-ring .k{font-family:var(--f-mono);font-size:8px;letter-spacing:.08em;color:var(--ink-mute);text-transform:uppercase;}
.score-ring.hi{border-color:var(--green);background:rgba(100,220,140,.06);}
.score-ring.hi .v{color:var(--green);}
.score-ring.mid{border-color:var(--amber);background:rgba(240,180,60,.06);}
.score-ring.mid .v{color:var(--amber);}
.idea-body{padding:0 32px 32px;border-top:1px solid var(--rule);display:none;}
.idea-body.open{display:block;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:24px;}
.field-label{font-family:var(--f-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px;}
.field-val{font-size:16px;line-height:1.65;color:var(--ink-soft);word-break:keep-all;}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--rule);border-radius:6px;margin-top:24px;overflow:hidden;}
.metric{padding:16px 20px;border-right:1px solid var(--rule);display:flex;flex-direction:column;gap:4px;}
.metric:last-child{border-right:none;}
.metric .mv{font-family:var(--f-en);font-size:32px;line-height:1;}
.metric .mk{font-family:var(--f-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);}
.metric.hi .mv{color:var(--green);}
.metric.warn .mv{color:var(--amber);}
.keywords{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.kw{font-family:var(--f-mono);font-size:11px;letter-spacing:.04em;padding:5px 10px;border:1px solid var(--rule);border-radius:999px;color:var(--ink-mute);}
.expand-btn{font-family:var(--f-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mute);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;flex-shrink:0;}
.assumptions-box{margin-top:24px;padding:16px 20px;border:1px solid var(--rule);border-radius:6px;background:rgba(240,235,225,.03);}
.assumptions-box .field-label{margin-bottom:10px;}
.assumptions-box ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.assumptions-box li{font-size:14px;color:var(--ink-soft);display:flex;gap:10px;line-height:1.5;word-break:keep-all;}
.assumptions-box li::before{content:"·";color:var(--ink-mute);flex-shrink:0;}
footer{padding:32px 60px;border-top:1px solid var(--rule);display:flex;justify-content:space-between;font-family:var(--f-mono);font-size:12px;color:var(--ink-mute);letter-spacing:.06em;}
@media(max-width:800px){nav,main,footer{padding-left:24px;padding-right:24px;}.two-col{grid-template-columns:1fr;}.metrics-row{grid-template-columns:1fr 1fr;}.metric:nth-child(2){border-right:none;}.idea-header{grid-template-columns:36px 1fr;}.score-badge{display:none;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="1.1"/><path d="M 16 3 A 13 13 0 1 0 16 29 A 10 13 0 1 1 16 3 Z" fill="currentColor"/></svg>
    LUA / BIM LABS
  </a>
  <a href="/" class="nav-back">← 홈으로</a>
</nav>

<main>
  <div class="page-header">
    <div class="label">Daily Report / 최고지배자 일일 검토</div>
    <h1>오늘의 3대<br><em>아이디어 리포트.</em></h1>
    <p class="subtitle">AI 조직이 매일 선별한 BIM 자동화 상품화 후보입니다. 구현 비용·수익성·리스크를 로컬 산식으로 추정합니다.</p>
    <div class="date-badge"><span class="dot"></span><span id="reportDate">로딩 중…</span></div>
  </div>

  <div id="loading">아이디어 리포트 로딩 중…</div>
  <div class="ideas-list" id="ideasList"></div>
</main>

<footer>
  <span>LUA BIM LABS · Daily Idea Report</span>
  <span>AI 조직 자동 생성 · 유료 API 미사용</span>
</footer>

<script>
function scoreClass(v, max) { return v >= max * 0.7 ? 'hi' : v >= max * 0.4 ? 'mid' : ''; }
function complexity(c) { return c === 'low' ? '낮음' : c === 'medium' ? '보통' : '높음'; }

async function load() {
  try {
    const r = await fetch('https://api.luabimlabs.com/api/daily-idea-report');
    const d = await r.json();
    document.getElementById('reportDate').textContent =
      new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric', weekday:'long'});
    document.getElementById('loading').style.display = 'none';

    const list = document.getElementById('ideasList');
    (d.ideas || []).forEach((idea, i) => {
      const rs = idea.revenue_score || 0;
      const card = document.createElement('div');
      card.className = 'idea-card';
      card.innerHTML = `
        <div class="idea-header" onclick="toggle(${i})">
          <span class="idea-num">0${i+1}</span>
          <div class="idea-title-block">
            <div class="idea-label">Idea / ${i+1} of ${d.ideas.length}</div>
            <h2 class="idea-title">${idea.title}</h2>
          </div>
          <div class="score-badge">
            <div class="score-ring ${scoreClass(rs,10)}">
              <span class="v">${rs}</span>
              <span class="k">Revenue</span>
            </div>
          </div>
          <span class="expand-btn" id="btn${i}">상세 보기 ↓</span>
        </div>
        <div class="idea-body" id="body${i}">
          <div class="two-col">
            <div>
              <div class="field-label">문제 (Problem)</div>
              <div class="field-val">${idea.problem || '—'}</div>
            </div>
            <div>
              <div class="field-label">솔루션 (Solution)</div>
              <div class="field-val">${idea.solution || '—'}</div>
            </div>
          </div>
          <div class="two-col" style="margin-top:20px;">
            <div>
              <div class="field-label">타겟 고객</div>
              <div class="field-val">${idea.customer || '—'}</div>
            </div>
            <div>
              <div class="field-label">구현 복잡도</div>
              <div class="field-val">${complexity(idea.complexity)}</div>
            </div>
          </div>
          <div class="metrics-row">
            <div class="metric ${scoreClass(rs,10)}">
              <span class="mv">${rs}<span style="font-size:18px;opacity:.6">/10</span></span>
              <span class="mk">수익성 점수</span>
            </div>
            <div class="metric ${(idea.time_saving_minutes||0)>=60?'hi':''}">
              <span class="mv">${idea.time_saving_minutes||0}<span style="font-size:18px;opacity:.6">min</span></span>
              <span class="mk">시간 절감</span>
            </div>
            <div class="metric">
              <span class="mv">${idea.estimated_hours||0}<span style="font-size:18px;opacity:.6">h</span></span>
              <span class="mk">개발 시간</span>
            </div>
            <div class="metric ${(idea.implementation_risk||0)<=4?'hi':'warn'}">
              <span class="mv">${idea.implementation_risk||0}<span style="font-size:18px;opacity:.6">/10</span></span>
              <span class="mk">구현 리스크</span>
            </div>
          </div>
          <div class="metrics-row" style="margin-top:8px;">
            <div class="metric">
              <span class="mv">$${(idea.estimated_cost_usd||0).toLocaleString()}</span>
              <span class="mk">예상 비용</span>
            </div>
            <div class="metric ${scoreClass(idea.store_fit||0,10)}">
              <span class="mv">${idea.store_fit||0}<span style="font-size:18px;opacity:.6">/10</span></span>
              <span class="mk">Store 적합도</span>
            </div>
            <div class="metric">
              <span class="mv">${(idea.estimated_tokens||0).toLocaleString()}</span>
              <span class="mk">예상 토큰</span>
            </div>
            <div class="metric">
              <span class="mv">${(idea.estimated_mrr_usd||0)>0?'$'+(idea.estimated_mrr_usd).toLocaleString():'—'}</span>
              <span class="mk">예상 MRR</span>
            </div>
          </div>
          ${(idea.keywords||[]).length ? `<div class="keywords">${(idea.keywords).map(k=>`<span class="kw">${k}</span>`).join('')}</div>` : ''}
        </div>`;
      list.appendChild(card);
    });

    if (d.assumptions?.length) {
      const box = document.createElement('div');
      box.className = 'assumptions-box';
      box.style.marginTop = '40px';
      box.innerHTML = `<div class="field-label">산정 기준 (Assumptions)</div><ul>${d.assumptions.map(a=>`<li>${a}</li>`).join('')}</ul>`;
      document.querySelector('main').appendChild(box);
    }
  } catch(e) {
    document.getElementById('loading').textContent = 'API 연결 오류. api.luabimlabs.com 상태를 확인해주세요.';
  }
}

function toggle(i) {
  const body = document.getElementById('body'+i);
  const btn = document.getElementById('btn'+i);
  const open = body.classList.toggle('open');
  btn.textContent = open ? '닫기 ↑' : '상세 보기 ↓';
}

load();
</script>
</body>
</html>

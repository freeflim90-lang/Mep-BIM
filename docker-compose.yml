services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - dev-venv:/app/.dev-venv
    env_file:
      - .env
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./config/cloudflared/docker-config.yml:/etc/cloudflared/config.yml:ro
      - ~/.cloudflared:/root/.cloudflared:ro
    depends_on:
      backend:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    restart: always
    volumes:
      - .:/app
      - dev-venv:/app/.dev-venv
    env_file:
      - .env
    working_dir: /app

volumes:
  dev-venv:
